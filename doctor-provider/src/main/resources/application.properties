spring.application.name=doctor-provider

# ========================================
# Database Configuration
# ========================================
# Jeder Service hat seine EIGENE Datenbank!
# doctor-provider -> doctor_provider_db
# patient-customer -> patient_customer_db
spring.datasource.url=jdbc:postgresql://localhost:${DOCTOR_DB_PORT:5433}/${DOCTOR_DB_NAME:doctor_provider_db}
spring.datasource.username=${DOCTOR_DB_USER:doctor_user}
spring.datasource.password=${DOCTOR_DB_PASSWORD:doctor_pass}

# ========================================
# JPA/Hibernate Configuration
# ========================================
# Flyway erstellt die Tabellen, Hibernate validiert nur.
# FlywayConfig.java garantiert, dass Flyway VOR Hibernate lõuft.
spring.jpa.hibernate.ddl-auto=validate

# SQL-Queries im Log anzeigen (Development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect (optional, wird automatisch erkannt)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# Flyway Configuration
# ========================================
# Konfiguration in FlywayConfig.java (Spring Boot 4 unterst³tzt spring.flyway.* nicht mehr)
