# ========================================
# Docker-Profil Konfiguration
# ========================================

spring.application.name=doctor-provider

# Database
spring.datasource.url=jdbc:postgresql://doctor-provider-db:5432/${DOCTOR_DB_NAME:doctor_provider_db}
spring.datasource.username=${DOCTOR_DB_USER:doctor_user}
spring.datasource.password=${DOCTOR_DB_PASSWORD:doctor_pass}

# JPA/Hibernate
# Flyway erstellt die Tabellen, Hibernate validiert nur.
# FlywayConfig.java garantiert, dass Flyway VOR Hibernate lõuft.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
# Konfiguration in FlywayConfig.java (Spring Boot 4 unterst³tzt spring.flyway.* nicht mehr)
